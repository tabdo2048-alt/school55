<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - Esam Kora</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 50px auto;
    width: 90%;
    max-width: 500px;
    border-radius: 15px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    width: 95%;
}

button:hover {
    background: #0072ff;
}
</style>
</head>

<body>

<div class="container">
    <h2>لوحة تحكم Esam Kora</h2>

    <input type="text" id="seat" placeholder="رقم الجلوس">
    <input type="text" id="name" placeholder="اسم الطالب">
    <input type="text" id="grade" placeholder="الصف">

    <input type="number" id="math" placeholder="رياضيات">
    <input type="number" id="physics" placeholder="فيزياء">
    <input type="number" id="chemistry" placeholder="كيمياء">
    <input type="number" id="biology" placeholder="أحياء">
    <input type="number" id="english" placeholder="إنجليزي">
    <input type="number" id="computer" placeholder="كمبيوتر">

    <button onclick="addStudent()">إضافة الطالب</button>

    <p id="msg"></p>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PAIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addStudent = async function() {
    let seat = document.getElementById("seat").value;
    let name = document.getElementById("name").value;
    let grade = document.getElementById("grade").value;

    let math = Number(document.getElementById("math").value);
    let physics = Number(document.getElementById("physics").value);
    let chemistry = Number(document.getElementById("chemistry").value);
    let biology = Number(document.getElementById("biology").value);
    let english = Number(document.getElementById("english").value);
    let computer = Number(document.getElementById("computer").value);

    let total = math + physics + chemistry + biology + english + computer;

    let status = total >= 210 ? "ناجح" : "راسب";

    if (!seat || !name) {
        document.getElementById("msg").innerText = "❌ املأ البيانات";
        return;
    }

    try {
        await addDoc(collection(db, "students"), {
            seat,
            name,
            grade,
            math,
            physics,
            chemistry,
            biology,
            english,
            computer,
            total,
            status
        });

        document.getElementById("msg").innerText = "✅ تم إضافة الطالب";

    } catch (error) {
        document.getElementById("msg").innerText = "❌ خطأ: " + error;
    }
}
</script>

</body>
</html>
