
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Esam Kora</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}
input, select, button {
  margin: 10px;
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}
button {
  background: #00c3ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<!-- 🔐 تسجيل الدخول -->
<h3>تسجيل الدخول</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<!-- 📚 إضافة مادة -->
<h3>إضافة مادة</h3>
<input type="text" id="subjectName" placeholder="اسم المادة">
<button onclick="addSubject()">إضافة مادة</button>

<!-- ❌ حذف مادة -->
<h3>حذف مادة</h3>
<input type="text" id="deleteSubject" placeholder="اسم المادة">
<button onclick="deleteSubject()">حذف مادة</button>

<hr>

<!-- 🎯 اختيار مادة -->
<h3>إضافة درجات طالب</h3>
<input type="text" id="seatNumber" placeholder="رقم الجلوس">

<select id="subjectsSelect"></select>

<input type="number" id="degree" placeholder="الدرجة">

<button onclick="addDegree()">إضافة الدرجة</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
// 🔥 بيانات Firebase (حط بتوعك هنا)
const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 تسجيل دخول
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("تم تسجيل الدخول ✅");
    })
    .catch(err => alert(err.message));
}

// 📚 تحميل المواد في Dropdown
function loadSubjects() {
  const select = document.getElementById("subjectsSelect");
  select.innerHTML = "";

  db.collection("subjects").get().then(snapshot => {
    snapshot.forEach(doc => {
      const option = document.createElement("option");
      option.value = doc.data().name;
      option.textContent = doc.data().name;
      select.appendChild(option);
    });
  });
}

// ➕ إضافة مادة
function addSubject() {
  const name = document.getElementById("subjectName").value;

  db.collection("subjects").add({ name: name })
    .then(() => {
      alert("تم إضافة المادة ✅");
      loadSubjects();
    });
}

// ❌ حذف مادة
function deleteSubject() {
  const name = document.getElementById("deleteSubject").value;

  db.collection("subjects")
    .where("name", "==", name)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => doc.ref.delete());
      alert("تم الحذف ✅");
      loadSubjects();
    });
}

// 🎯 إضافة درجة لطالب
function addDegree() {
  const seat = document.getElementById("seatNumber").value;
  const subject = document.getElementById("subjectsSelect").value;
  const degree = document.getElementById("degree").value;

  db.collection("students").doc(seat).set({
    subjects: {
      [subject]: Number(degree)
    }
  }, { merge: true });

  alert("تم إضافة الدرجة ✅");
}

// تحميل المواد أول ما الصفحة تفتح
loadSubjects();

</script>

</body>
</html>
