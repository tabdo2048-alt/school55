
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Esam Kora</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

.container {
    margin: 50px auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
}

input, button, select {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    background: #00c6ff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 Login -->
<div class="container" id="loginBox">
    <h2>تسجيل دخول الأدمن</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">دخول</button>
    <p id="loginMsg"></p>
</div>

<!-- 🧠 Admin Panel -->
<div class="container" id="adminPanel" style="display:none;">
    <h2>لوحة التحكم</h2>

    <button onclick="logout()">تسجيل خروج</button>

    <input type="text" id="seat" placeholder="رقم الجلوس">
    <input type="text" id="name" placeholder="اسم الطالب">
    <input type="text" id="grade" placeholder="الصف">

    <h3>إضافة درجات الطالب (المواد اختيارية)</h3>
    <input type="number" id="math" placeholder="رياضيات">
    <input type="number" id="physics" placeholder="فيزياء">
    <input type="number" id="chemistry" placeholder="كيمياء">
    <input type="number" id="biology" placeholder="أحياء">
    <input type="number" id="english" placeholder="إنجليزي">
    <input type="number" id="computer" placeholder="كمبيوتر">

    <button onclick="addStudent()">إضافة الطالب</button>

    <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 تسجيل الدخول
window.login = function() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {})
    .catch(() => {
        document.getElementById("loginMsg").innerText = "❌ بيانات غلط";
    });
}

// 🔄 متابعة حالة تسجيل الدخول
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    } else {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
    }
});

// 🚪 تسجيل خروج
window.logout = function() {
    signOut(auth);
}

// ➕ إضافة طالب (المواد اختيارية)
window.addStudent = async function() {
    let seat = document.getElementById("seat").value;
    let name = document.getElementById("name").value;
    let grade = document.getElementById("grade").value;

    // جمع المواد ديناميك
    let subjects = {};
    const fields = ["math","physics","chemistry","biology","english","computer"];
    fields.forEach(f => {
        let val = document.getElementById(f).value;
        if(val !== "") {  // لو حاطط حاجة بس
            subjects[f] = Number(val);
        }
    });

    let total = Object.values(subjects).reduce((a,b)=>a+b,0);
    let status = total >= 210 ? "ناجح" : "راسب";

    try {
        await addDoc(collection(db, "students"), {
            seat, name, grade,
            subjects,   // المواد فقط اللي اتضافت
            total, status
        });

        document.getElementById("msg").innerText = "✅ تم الإضافة";

    } catch(e) {
        document.getElementById("msg").innerText = "❌ خطأ";
    }
}
</script>

</body>
</html>
