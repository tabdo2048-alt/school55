<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Esam Kora - نتيجة الطلاب</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

.container {
    margin-top: 100px;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    background: #0072ff;
}

.card {
    margin-top: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>نتيجة مدرسة Esam Kora</h1>

    <input type="text" id="seat" placeholder="ادخل رقم الجلوس">
    <br>
    <button onclick="getResult()">عرض النتيجة</button>
    <br>
    <button onclick="goTop()">عرض أوائل الطلاب</button>

    <div id="result"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.getResult = async function() {
    let seat = document.getElementById("seat").value.trim();
    let resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "⏳ جاري البحث...";

    try {
        let querySnapshot = await getDocs(collection(db, "students"));

        let found = false;

        querySnapshot.forEach((doc) => {
            let data = doc.data();

            if (data.seat === seat) {
                found = true;

                resultDiv.innerHTML = `
                    <div class="card">
                        <h2>${data.name}</h2>
                        <p>الصف: ${data.grade}</p>

                        <hr>

                        <p>رياضيات: ${data.math}</p>
                        <p>فيزياء: ${data.physics}</p>
                        <p>كيمياء: ${data.chemistry}</p>
                        <p>لغة عربية: ${data.biology}</p>
                        <p>إنجليزي: ${data.english}</p>
                        <p>كمبيوتر: ${data.computer}</p>

                        <hr>

                        <h3>المجموع: ${data.total}</h3>
                        <h3>الحالة: ${data.status}</h3>
                    </div>
                `;
            }
        });

        if (!found) {
            resultDiv.innerHTML = "❌ رقم الجلوس غير موجود";
        }

    } catch (error) {
        resultDiv.innerHTML = "❌ حصل خطأ: " + error;
    }
}

// زرار أوائل الطلاب
window.goTop = function() {
    window.location.href = "top.html";
}
</script>

</body>
</html>
