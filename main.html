<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ESAM KORA SEC</title>
<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: #1e1e2f;
    color: white;
}
.container {
    margin-top: 50px;
}
input, button, select {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}
button {
    background: #00c6ff;
    color: white;
}
#result {
    margin-top: 20px;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h1>نتيجة الطالب</h1>

    <select id="mode">
        <option value="csv">📂 من ملف CSV</option>
        <option value="firebase">☁️ من قاعدة البيانات</option>
    </select>

    <br>

    <input type="file" id="file" accept=".csv">
    <br>

    <input type="text" id="seat" placeholder="رقم الجلوس">
    <br>

    <button onclick="search()">بحث</button>

    <div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📂 CSV
let csvData = [];

function parseCSV(text){
    const lines = text.trim().split("\n");
    const headers = lines.shift().split(",");
    csvData = lines.map(line=>{
        let obj = {};
        let data = line.split(",");
        headers.forEach((h,i)=>{
            obj[h] = data[i] ? data[i].trim() : "";
        });
        return obj;
    });
}

document.getElementById("file").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(ev){
        parseCSV(ev.target.result);
        alert("✅ تم تحميل الملف");
    }
    reader.readAsText(e.target.files[0]);
});

// 🔍 البحث
window.search = async function(){
    const seat = document.getElementById("seat").value;
    const mode = document.getElementById("mode").value;
    const resultDiv = document.getElementById("result");

    if(mode === "csv"){
        let student = csvData.find(s => s.seat == seat);
        if(!student){
            resultDiv.innerHTML = "❌ الطالب غير موجود";
            return;
        }

        let total = 0;
        let subjectsHTML = "";

        for(let key in student){
            if(!["seat","name","grade"].includes(key) && student[key] !== ""){
                let mark = Number(student[key]);
                total += mark;
                subjectsHTML += `<p>${key}: ${mark}</p>`;
            }
        }

        resultDiv.innerHTML = `
            <h3>${student.name}</h3>
            <p>الصف: ${student.grade}</p>
            ${subjectsHTML}
            <h2>المجموع: ${total} / 280</h2>
        `;
    }

    if(mode === "firebase"){
        const querySnapshot = await getDocs(collection(db,"students"));
        let found = null;

        querySnapshot.forEach(doc=>{
            if(doc.data().seat == seat){
                found = doc.data();
            }
        });

        if(!found){
            resultDiv.innerHTML = "❌ الطالب غير موجود";
            return;
        }

        let subjectsHTML = "";
        let total = found.total || 0;

        for(let sub in found.subjects){
            subjectsHTML += `<p>${sub}: ${found.subjects[sub]}</p>`;
        }

        resultDiv.innerHTML = `
            <h3>${found.name}</h3>
            <p>الصف: ${found.grade}</p>
            ${subjectsHTML}
            <h2>المجموع: ${total} / 280</h2>
        `;
    }
}
</script>

</body>
</html>
