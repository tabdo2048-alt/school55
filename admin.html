<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Esam Kora</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

.container {
    margin: 50px auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    background: #00c6ff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 Login -->
<div class="container" id="loginBox">
    <h2>تسجيل دخول الأدمن</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">دخول</button>
    <p id="loginMsg"></p>
</div>

<!-- 🧠 Admin Panel -->
<div class="container" id="adminPanel" style="display:none;">
    <h2>لوحة التحكم</h2>

    <button onclick="logout()">تسجيل خروج</button>

    <h3>إضافة طالب يدوي</h3>
    <input type="text" id="seat" placeholder="رقم الجلوس">
    <input type="text" id="name" placeholder="اسم الطالب">
    <input type="text" id="grade" placeholder="الصف">

    <input type="number" id="math" placeholder="رياضيات">
    <input type="number" id="physics" placeholder="فيزياء">
    <input type="number" id="chemistry" placeholder="كيمياء">
    <input type="number" id="arabic" placeholder="عربي">
    <input type="number" id="english" placeholder="إنجليزي">
    <input type="number" id="integrated" placeholder="علوم متكاملة">

    <button onclick="addStudent()">إضافة الطالب</button>

    <h3>رفع ملف CSV</h3>
    <input type="file" id="csvFile" accept=".csv">
    <button onclick="uploadCSV()">رفع CSV</button>

    <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 تسجيل الدخول
window.login = function() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {})
    .catch(() => {
        document.getElementById("loginMsg").innerText = "❌ بيانات غلط";
    });
}

// 🔄 متابعة حالة تسجيل الدخول
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    } else {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
    }
});

// 🚪 تسجيل خروج
window.logout = function() {
    signOut(auth);
}

// ➕ إضافة طالب يدوي
window.addStudent = async function() {
    let seat = document.getElementById("seat").value;
    let name = document.getElementById("name").value;
    let grade = document.getElementById("grade").value;

    let subjects = {
        math: Number(document.getElementById("math").value),
        physics: Number(document.getElementById("physics").value),
        chemistry: Number(document.getElementById("chemistry").value),
        arabic: Number(document.getElementById("arabic").value),
        english: Number(document.getElementById("english").value),
        integrated: Number(document.getElementById("integrated").value)
    };

    let total = 0;
    for (let sub in subjects) {
        if (!isNaN(subjects[sub]) && subjects[sub] > 0) total += subjects[sub];
        else subjects[sub] = undefined;
    }

    let status = total >= 210 ? "ناجح" : "راسب";

    try {
        await addDoc(collection(db, "students"), {
            seat,name,grade,
            subjects,total,status
        });

        document.getElementById("msg").innerText = "✅ تم الإضافة";

    } catch (e) {
        document.getElementById("msg").innerText = "❌ خطأ";
    }
}

// 📁 رفع CSV
window.uploadCSV = function() {
    let fileInput = document.getElementById("csvFile");
    if (!fileInput.files.length) {
        alert("اختر ملف CSV");
        return;
    }

    let file = fileInput.files[0];
    let reader = new FileReader();

    reader.onload = async function(e) {
        let text = e.target.result;
        let rows = text.split("\n").map(r => r.trim()).filter(r=>r);
        let headers = rows[0].split(",");

        for (let i=1; i<rows.length; i++) {
            let values = rows[i].split(",");
            let student = {
                seat: values[0],
                name: values[1],
                grade: values[2],
                subjects: {}
            };
            let total = 0;
            for (let j=3; j<headers.length; j++) {
                let deg = parseInt(values[j]) || 0;
                if (deg>0) {
                    student.subjects[headers[j]] = deg;
                    total += deg;
                }
            }
            student.total = total;
            student.status = total >= 210 ? "ناجح" : "راسب";

            try {
                await addDoc(collection(db, "students"), student);
            } catch(e) {
                console.log("خطأ رفع: ", student, e);
            }
        }
        document.getElementById("msg").innerText = "✅ تم رفع كل الطلاب من CSV";
    }

    reader.readAsText(file);
}
</script>

</body>
</html>
